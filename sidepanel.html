<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #252526;
            --panel2: #2d2d30;
            --border: #3c3c3c;
            --fg: #d4d4d4;
            --muted: #858585;
            --accent: #4ec9b0;
            --accent2: #569cd6;
            --warn: #d7ba7d;
            --err: #f48771;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-width: 320px;
            max-width: 100%;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        button {
            padding: 4px 10px;
            background: var(--panel2);
            color: var(--fg);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        button.primary {
            background: var(--accent2);
            color: #fff;
            border-color: var(--accent2);
        }

        button:hover {
            filter: brightness(1.2);
        }

        .total-banner {
            margin-top: 8px;
            padding: 8px 10px;
            background: var(--panel2);
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .total-label {
            color: var(--muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .total-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            margin-top: 2px;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
        }

        .breakdown {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
        }

        main {
            padding: 8px 12px 16px;
        }

        .empty {
            color: var(--muted);
            padding: 12px;
            text-align: center;
            font-style: italic;
        }

        .err-msg {
            color: var(--err);
            padding: 8px;
            background: rgba(244, 135, 113, 0.08);
            border-radius: 4px;
        }

        .warn-msg {
            color: var(--warn);
            padding: 8px;
            background: rgba(215, 186, 125, 0.08);
            border-radius: 4px;
        }

        details {
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 6px;
            background: var(--panel);
            overflow: hidden;
        }

        details>summary {
            cursor: pointer;
            padding: 6px 10px;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }

        details>summary::-webkit-details-marker {
            display: none;
        }

        details>summary::before {
            content: '▶';
            color: var(--muted);
            font-size: 9px;
            transition: transform 0.15s;
            display: inline-block;
        }

        details[open]>summary::before {
            transform: rotate(90deg);
        }

        details>summary:hover {
            background: var(--panel2);
        }

        .summary-line {
            display: flex;
            flex: 1;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .summary-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .summary-meta {
            color: var(--muted);
            font-size: 11px;
            flex-shrink: 0;
        }

        .summary-size {
            color: var(--accent);
            font-weight: 600;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            flex-shrink: 0;
        }

        .summary-size.zero {
            color: var(--muted);
            font-weight: 400;
        }

        .badge {
            display: inline-block;
            padding: 1px 6px;
            background: var(--panel2);
            color: var(--muted);
            border-radius: 8px;
            font-size: 10px;
            font-family: ui-monospace, monospace;
        }

        .nested {
            padding: 4px 10px 8px 24px;
        }

        .nested details {
            background: var(--panel2);
        }

        .nested .nested details {
            background: var(--bg);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            margin-top: 4px;
        }

        th,
        td {
            text-align: left;
            padding: 3px 6px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--muted);
            font-weight: 500;
            font-size: 10px;
            text-transform: uppercase;
        }

        th.sortable {
            cursor: pointer;
            user-select: none;
        }

        th.sortable:hover {
            color: var(--fg);
        }

        th.sorted {
            color: var(--accent);
        }

        .breakdown[title],
        #ctxCount[title],
        .summary-meta[title] {
            cursor: help;
        }

        td.num {
            text-align: right;
        }

        td.size {
            color: var(--accent);
        }

        tbody tr:hover {
            background: var(--panel);
        }

        pre.raw {
            background: #000;
            padding: 8px;
            border-radius: 3px;
            font-size: 10px;
            max-height: 240px;
            overflow: auto;
            margin-top: 6px;
            color: var(--fg);
        }

        pre.stack {
            background: #1a1a1a;
            padding: 6px 8px;
            margin: 0;
            border-left: 2px solid var(--accent2);
            font-size: 10px;
            max-height: 160px;
            overflow: auto;
            color: var(--muted);
            white-space: pre-wrap;
            word-break: break-all;
        }

        tr.has-stack {
            cursor: pointer;
        }

        tr.has-stack td:first-child::before {
            content: '▸ ';
            color: var(--accent2);
        }

        tr.has-stack.open td:first-child::before {
            content: '▾ ';
        }

        tr.stack-row td {
            padding: 0;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <header>
        <h1>
            <span>GPU Memory Profiler</span>
            <span id="ctxCount" class="badge">—</span>
        </h1>
        <div class="toolbar">
            <button class="primary" id="refresh">⟳ Refresh</button>
            <button id="copy">⧉ Copy JSON</button>
            <button id="toggleRaw">{} Raw</button>
            <label
                title="When ON, the profiler holds strong refs so leaked resources stay visible (leak-detector mode). Turn OFF to let GC reclaim resources the app dropped — useful when investigating bugs elsewhere."
                style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);margin-left:auto;">
                <input type="checkbox" id="holdRefs" checked> hold
            </label>
            <label
                title="When ON, capture a JS call stack at every allocation so each row can show where it was created. Has measurable overhead."
                style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);">
                <input type="checkbox" id="captureStacks"> stacks
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);">
                <input type="checkbox" id="autoRefresh"> auto
            </label>
        </div>
        <div class="total-banner">
            <div class="total-label">Total GPU Memory</div>
            <div class="total-value" id="totalMem">—</div>
            <div class="breakdown" id="breakdown">click Refresh to scan</div>
        </div>
    </header>

    <main id="content">
        <div class="empty">Click Refresh to scan the active tab.</div>
    </main>

    <script src="sidepanel.js"></script>
</body>

</html>
